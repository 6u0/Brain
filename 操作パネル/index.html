<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Brain Operation Panel</title>
    <style>
        :root {
            --bg-color: #121212;
            --panel-bg: #1e1e1e;
            --accent-color: #b00020;
            --text-main: #e0e0e0;
            --text-muted: #888;
            --btn-bg: #333;
            --success: #03dac6;
        }

        body {
            font-family: "Helvetica Neue", Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-user-select: none;
        }

        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.85);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(3px);
        }

        .modal-box {
            background-color: var(--panel-bg);
            border: 2px solid var(--accent-color);
            border-radius: 12px;
            padding: 30px;
            text-align: center;
            min-width: 300px;
            max-width: 80%;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.8);
        }

        .modal-message {
            font-size: 1.2em;
            margin-bottom: 25px;
            font-weight: bold;
        }

        .modal-buttons {
            display: flex;
            justify-content: center;
            gap: 15px;
        }

        .modal-btn {
            padding: 12px 25px;
            font-size: 1.1em;
            flex: 1;
            border: none;
            border-radius: 6px;
            color: white;
            font-weight: bold;
            cursor: pointer;
        }

        .modal-btn.cancel { background-color: #444; }
        .modal-btn.confirm { background-color: var(--accent-color); }

        .tab-nav {
            display: flex;
            background-color: #000;
            border-bottom: 2px solid #333;
        }

        .tab-btn {
            flex: 1;
            padding: 15px;
            text-align: center;
            font-size: 1.1em;
            font-weight: bold;
            color: var(--text-muted);
            background: none;
            border: none;
            cursor: pointer;
        }

        .tab-btn.active {
            color: var(--text-main);
            border-bottom: 3px solid var(--accent-color);
        }

        .container {
            padding: 20px;
            max-width: 800px;
            margin: 0 auto;
        }

        .tab-content { display: none; }
        .tab-content.active { display: block; }

        .panel {
            background-color: var(--panel-bg);
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
            margin-bottom: 20px;
        }

        h2 {
            margin-top: 0;
            border-bottom: 1px solid #333;
            padding-bottom: 10px;
        }

        .form-group { margin-bottom: 15px; }

        label {
            display: block;
            margin-bottom: 5px;
            font-size: 0.9em;
            color: var(--text-muted);
        }

        input[type="text"], input[type="number"] {
            width: 100%;
            padding: 10px;
            box-sizing: border-box;
            background-color: #2a2a2a;
            border: 1px solid #444;
            color: white;
            border-radius: 6px;
            font-size: 1em;
        }

        .btn-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
        }

        button {
            padding: 15px;
            font-size: 1.1em;
            font-weight: bold;
            border: none;
            border-radius: 8px;
            background-color: var(--btn-bg);
            color: var(--text-main);
            cursor: pointer;
            transition: all 0.2s;
        }

        button:active { transform: scale(0.95); }
        .staff-btn.active { background-color: var(--success); color: #000; }

        .btn-start {
            background-color: var(--accent-color);
            width: 100%;
            padding: 25px;
            font-size: 1.5em;
            margin-top: 10px;
        }

        .btn-test {
            background-color: #444;
            font-size: 0.9em;
        }

        .status-box {
            background-color: #000;
            padding: 20px;
            border-radius: 8px;
            text-align: center;
            font-size: 1.8em;
            font-weight: bold;
            color: var(--accent-color);
            border: 2px solid #333;
        }

        .ws-status {
            display: inline-block;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background-color: red;
            margin-right: 8px;
        }

        .ws-status.connected { background-color: var(--success); }

        #log-area {
            background-color: #000;
            color: var(--success);
            padding: 10px;
            height: 150px;
            overflow-y: auto;
            font-family: monospace;
            font-size: 0.9em;
            border-radius: 6px;
        }
    </style>
</head>
<body>
    <div id="custom-modal" class="modal-overlay">
        <div class="modal-box">
            <div id="modal-message" class="modal-message">メッセージ</div>
            <div id="modal-buttons" class="modal-buttons"></div>
        </div>
    </div>

    <div class="tab-nav">
        <button class="tab-btn active" data-tab="main">Main</button>
        <button class="tab-btn" data-tab="admin">Admin</button>
    </div>

    <div class="container">
        <div id="tab-main" class="tab-content active">
            <div class="panel">
                <h2>1. Staff</h2>
                <div class="btn-grid" id="staff-grid">
                    <button class="staff-btn" data-staff="A">A</button>
                    <button class="staff-btn" data-staff="B">B</button>
                    <button class="staff-btn" data-staff="C">C</button>
                    <button class="staff-btn" data-staff="D">D</button>
                    <button class="staff-btn" data-staff="E">E</button>
                    <button class="staff-btn" data-staff="F">F</button>
                </div>
                <p style="text-align: right; margin-bottom: 0;">現在: <strong id="current-staff" style="color:var(--success);">未選択</strong></p>
            </div>

            <div class="panel">
                <h2>2. Phase</h2>
                <div class="status-box" id="phase-display">Phase: WAIT</div>
                <button class="btn-start" id="start-button">体験スタート</button>
            </div>
        </div>

        <div id="tab-admin" class="tab-content">
            <div class="panel">
                <h2>Phase Control</h2>
                <div style="display:flex; gap:10px;">
                    <button id="prev-phase" style="flex:1; background-color:#444;">前へ</button>
                    <button id="next-phase" style="flex:1; background-color:#444;">次へ</button>
                </div>
            </div>

            <div class="panel">
                <h2>Connection</h2>
                <div class="form-group">
                    <label>WebSocket URL</label>
                    <input type="text" id="ws-url" value="">
                </div>
                <div class="form-group">
                    <label>OSC Target IP</label>
                    <input type="text" id="osc-ip" value="127.0.0.1">
                </div>
                <div class="form-group">
                    <label>OSC Port</label>
                    <input type="number" id="osc-port" value="9000">
                </div>
                <button id="connect-button" style="width:100%; background-color:var(--success); color:#000;">接続 / 更新</button>
            </div>

            <div class="panel">
                <h2><span id="ws-indicator" class="ws-status"></span>Log</h2>
                <div id="log-area"></div>
            </div>
        </div>
    </div>

    <script>
        let ws = null;
        let panelPingInterval = null;
        let currentStaffName = "";
        let autoConfigured = false;

        function log(msg) {
            const logArea = document.getElementById("log-area");
            const time = new Date().toLocaleTimeString("ja-JP");
            logArea.innerHTML += `<div>[${time}] ${msg}</div>`;
            logArea.scrollTop = logArea.scrollHeight;
        }

        function showModal(message, type = "alert", onConfirm = null) {
            const modal = document.getElementById("custom-modal");
            const msgEl = document.getElementById("modal-message");
            const btnContainer = document.getElementById("modal-buttons");

            msgEl.textContent = message;
            btnContainer.innerHTML = "";

            if (type === "alert") {
                const okBtn = document.createElement("button");
                okBtn.className = "modal-btn confirm";
                okBtn.textContent = "OK";
                okBtn.onclick = () => {
                    modal.style.display = "none";
                };
                btnContainer.appendChild(okBtn);
            } else {
                const cancelBtn = document.createElement("button");
                cancelBtn.className = "modal-btn cancel";
                cancelBtn.textContent = "キャンセル";
                cancelBtn.onclick = () => {
                    modal.style.display = "none";
                };

                const confirmBtn = document.createElement("button");
                confirmBtn.className = "modal-btn confirm";
                confirmBtn.textContent = "はい";
                confirmBtn.onclick = () => {
                    modal.style.display = "none";
                    if (onConfirm) {
                        onConfirm();
                    }
                };

                btnContainer.appendChild(cancelBtn);
                btnContainer.appendChild(confirmBtn);
            }

            modal.style.display = "flex";
        }

        function switchTab(tabName) {
            document.querySelectorAll(".tab-content").forEach((el) => el.classList.remove("active"));
            document.querySelectorAll(".tab-btn").forEach((el) => el.classList.remove("active"));
            document.getElementById(`tab-${tabName}`).classList.add("active");
            document.querySelector(`.tab-btn[data-tab="${tabName}"]`).classList.add("active");
        }

        function buildAutoWsUrl() {
            const protocol = window.location.protocol === "https:" ? "wss:" : "ws:";
            return `${protocol}//${window.location.host}`;
        }

        function selectStaff(name, btnElement) {
            currentStaffName = name;
            document.getElementById("current-staff").innerText = name;
            document.querySelectorAll(".staff-btn").forEach((btn) => btn.classList.remove("active"));
            btnElement.classList.add("active");
            sendOSC("/system/staff", name);
            log(`Staff selected: ${name}`);
        }

        function startGame() {
            if (!currentStaffName) {
                showModal("スタッフを選択してください。");
                return;
            }

            showModal("体験を開始しますか？", "confirm", () => {
                sendOSC("/phase/start", 1);
                log("Sent start command.");
            });
        }

        function connectWebSocket(forceUrl = null) {
            const url = forceUrl || document.getElementById("ws-url").value;
            document.getElementById("ws-url").value = url;
            log(`Connecting to WebSocket: ${url}`);

            if (ws) {
                ws.close();
            }

            try {
                ws = new WebSocket(url);
                ws.onopen = () => {
                    document.getElementById("ws-indicator").classList.add("connected");
                    log("WebSocket connected.");
                    sendOSC("/phase/query", 1);
                    startPanelPing();
                };
                ws.onclose = () => {
                    document.getElementById("ws-indicator").classList.remove("connected");
                    stopPanelPing();
                    log("WebSocket disconnected.");
                };
                ws.onerror = () => {
                    log("WebSocket error.");
                };
                ws.onmessage = (event) => {
                    const data = JSON.parse(event.data);
                    if (data.address === "/phase/current") {
                        const phaseValue = data.value ?? (data.args && data.args.length > 0 ? data.args[0] : "UNKNOWN");
                        document.getElementById("phase-display").innerText = `Phase: ${phaseValue}`;
                        log(`Phase updated: ${phaseValue}`);
                    } else if (data.address === "/panel/auto_config") {
                        applyAutoConfiguration(data.args || []);
                    } else if (data.address === "/panel/unity_status") {
                        reflectUnityStatus(data.args || []);
                    }
                };
            } catch (error) {
                log(`WebSocket init failed: ${error.message}`);
            }
        }

        function startPanelPing() {
            stopPanelPing();
            panelPingInterval = setInterval(() => {
                sendOSC("/panel/ping", 1);
            }, 2000);
        }

        function stopPanelPing() {
            if (panelPingInterval) {
                clearInterval(panelPingInterval);
                panelPingInterval = null;
            }
        }

        function sendOSC(address, value = null) {
            const ip = document.getElementById("osc-ip").value;
            const port = parseInt(document.getElementById("osc-port").value, 10);
            const message = {
                ip,
                port,
                address,
                args: value !== null ? [{ type: typeof value === "number" ? "i" : "s", value }] : []
            };

            if (ws && ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify(message));
                log(`Sent OSC: ${address} [${value}] -> ${ip}:${port}`);
            } else {
                log(`WebSocket offline: ${address}`);
            }
        }

        function applyAutoConfiguration(args) {
            if (args.length < 2) {
                return;
            }

            const [ip, port] = args;
            document.getElementById("osc-ip").value = ip || "127.0.0.1";
            document.getElementById("osc-port").value = Number(port || 9000);

            if (!autoConfigured) {
                autoConfigured = true;
                log(`Auto OSC config applied: ${ip}:${port}`);
            } else {
                log(`OSC config refreshed: ${ip}:${port}`);
            }
        }

        function reflectUnityStatus(args) {
            const unityOnline = Number(args[0] || 0) === 1;
            const panelLinked = Number(args[1] || 0) === 1;
            if (!unityOnline) {
                log("Unity status: offline");
                return;
            }

            log(panelLinked ? "Unity status: connected" : "Unity status: waiting");
        }

        document.querySelectorAll(".tab-btn").forEach((btn) => {
            btn.addEventListener("click", () => switchTab(btn.dataset.tab));
        });

        document.querySelectorAll(".staff-btn").forEach((btn) => {
            btn.addEventListener("click", () => selectStaff(btn.dataset.staff, btn));
        });

        document.getElementById("start-button").addEventListener("click", startGame);
        document.getElementById("prev-phase").addEventListener("click", () => sendOSC("/phase/prev"));
        document.getElementById("next-phase").addEventListener("click", () => sendOSC("/phase/next"));
        document.getElementById("connect-button").addEventListener("click", () => connectWebSocket());

        window.onload = () => {
            log("System boot sequence initiated.");
            connectWebSocket(buildAutoWsUrl());
        };
    </script>
</body>
</html>
